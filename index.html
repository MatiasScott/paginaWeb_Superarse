  <meta content="Free HTML Templates" name="keywords" />
  <meta content="Free HTML Templates" name="description" />

  <!-- Favicon -->
  <link href="assets/img/content/logo/superarse_gris.png" rel="icon" />

  <!-- Google Web Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Nunito&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Font Awesome -->


  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet" />

  <link href="/lib/flaticon/font/flaticon.css" rel="stylesheet" />

  <link href="/css/style.css" rel="stylesheet" />

<body>
  <div class="container-fluid bg-light  shadow"></div>

  <!-- Header Start -->
  <div class="video-responsive-container">
    <video src="/assets/videos/Video-HeaderWeb-SuperarseV2.mp4" class="video-inst" autoplay loop playsinline muted
      w-full></video>
  </div>
  <!-- Header End -->

  <div class="container-submenu pt-5">
    <div class="pb-3">
      <div class="row justify-content-center"></div>
    </div>
  </div>
  <!-- ofertas academicas -->
  <div class="container-fluid-ofertaA py-5">
    <div class="p-0">
      <div class="text-center pb-2">
        <p class="section-title px-5">
          <span class="px-2">Oferta Academica</span>
        </p>
        <h1 class="mb-4">Carreras</h1>
      </div>
      <div class="owl-carousel ofertaA-carousel"></div>
    </div>
  </div>
  <!-- oferta academica End -->
  <!-- Team Start -->
  <div class="container-fluid-selloU pt-5">
    <div class="p-0">
      <div class="text-center pb-2">
        <p class="section-title px-5">
          <span class="px-2">Nuestro sello Único</span>
        </p>
        <h1 class="mb-4">Descubre por qué somos diferentes</h1>
      </div>
      <div class="owl-carousel selloU-carousel"></div>
    </div>
  </div>
  <!-- Team End -->
  <!-- Notice Start -->
  <div class="container-fluid-noticias pt-5">
    <div class="p-0">
      <div class="text-center pb-2">
        <p class="section-title px-5">
          <span class="px-2">Noticias</span>
        </p>
        <h1 class="mb-4">Descubre lo nuevo</h1>
      </div>
      <div class="owl-carousel noticias-carousel"></div>
    </div>
  </div>
  <!-- Notice End -->
  <!-- Testimonial Start -->
  <div class="container-fluid py-5">
    <div class="container p-0">
      <div class="text-center pb-2">
        <p class="section-title px-5">
          <span class="px-2">Testimonios</span>
        </p>
        <h1 class="mb-4">Nuestros estudiantes dicen</h1>
      </div>
      <div class="owl-carousel testimonial-carousel" style="text-align: justify;"></div>
    </div>
  </div>
  <!-- Testimonial End -->
  <!--Información de estudiante -->
  <div class="text-center pb-2">
    <p class="section-title px-5">
      <span class="px-2">Estadísticas</span>
    </p>
    <h1 class="mb-4">Nuestras estadísticas lo dicen </h1>
  </div>
  <div class="stats-container">

    <div class="stat-item">
      <div class="number blue">6</div>
      <div class="label">Años de experiencia </div>
    </div>
    <div class="stat-item">
      <div class="number green">11</div>
      <div class="label">Carreras tecnológicas</div>
    </div>

    <div class="stat-item">
      <div class="number orange-dark"> 670</div>
      <div class="label">Estudiantes Activos</div>
    </div>

  </div>
  <div class="separate-image-section">
    <img src="/assets/img/bienestarEstudiantil/footer/Formatos-web-agosto.jpg" alt="Descripción de la imagen">
  </div>

  <!--Muestra el pie de pagina -->

  <div class="footer-container"></div>

  <!-- JavaScript Libraries -->
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
  <script src="/lib/easing/easing.min.js"></script>
  <script src="/lib/owlcarousel/owl.carousel.min.js"></script>
  <script src="/lib/isotope/isotope.pkgd.min.js"></script>

  <!-- Template Javascript -->
  <script src="/js/moduls/header.js?v=1"></script>
  <script src="/js/moduls/menuSecundario.js"></script>
  <script src="/js/moduls/ofertaAcademica.js"></script>
  <script src="/js/moduls/selloUnico.js"></script>
  <script src="/js/moduls/testimonios.js"></script>
  <script src="/js/moduls/Informacion.js"></script>
  <script src="/js/moduls/footer.js?v=5"></script>
  <script src="/js/moduls/noticias.js"></script>

  <script src="/js/global.js"></script>
  <script src="/js/main.js?v=3"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
